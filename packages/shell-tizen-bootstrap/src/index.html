<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1920, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>JellyPlug</title>
    <!-- JEL-2040: Hosted Shell Bootstrap (HSB).
         This WGT ships a near-immutable bootstrap. The real shell.min.js
         lives at ${server}/shell/shell.min.js so future shell updates are
         a server-side file swap with no sdb-shell/pkgcmd involvement.
         Fallback: if the server-hosted shell is unreachable, load the
         baked-in boot-shell.min.js (last-known-good at WGT build time)
         so the TV is never stranded. -->
    <style>html,body{background:#101010;margin:0;color:#eee;font-family:sans-serif}#boot-root{display:none}.boot-shell{padding:60px;text-align:center}.boot-shell h1{font-size:48px;margin:0 0 24px;color:#ff6a1a}#server-form input{width:600px;padding:12px;font-size:20px}#server-form button{padding:12px 24px;font-size:20px;margin-left:8px;background:#ff6a1a;color:#101010;border:0;border-radius:4px;cursor:pointer}.boot-hint{opacity:0.6;margin-top:24px}.boot-error{color:#ff7070}
    /* JEL-2046 AC3 diagnostic overlay. Renders bootstrap state on screen so
       verification works without Web Inspector (Q60 has appcmd_support:disabled
       and intershell_support:disabled, both required for debug-launch).
       OFF by default (JEL-22: we are past AC3 and doing real content/parity
       testing, so a fresh retail install must not burn the green console onto
       the home screen). Opt in for diagnostics with
       localStorage.setItem('jellyfin.shell.hsbDebug','1'). */
    #hsb-status{position:fixed;left:0;right:0;bottom:0;z-index:2147483647;
        background:rgba(0,0,0,0.85);color:#0f0;font-family:Consolas,monospace;
        font-size:22px;padding:14px 24px;line-height:1.3;
        border-top:3px solid #0f0;white-space:pre-wrap;word-break:break-all}
    #hsb-status.hsb-warn{color:#ff0;border-top-color:#ff0}
    #hsb-status.hsb-err{color:#f55;border-top-color:#f55}
    #hsb-status.hsb-ok{color:#0f0;border-top-color:#0f0}
    #hsb-status .hsb-tag{font-weight:700;letter-spacing:1px;font-size:26px}
    #hsb-status.hsb-hidden{display:none}</style>
</head>
<body>
    <div id="boot-root">
        <div class="boot-shell">
            <h1>JellyPlug</h1>
            <p>Enter your Jellyfin server address to continue.</p>
            <form id="server-form" novalidate>
                <input id="server-input" type="url" placeholder="https://jellyfin.example.com" autofocus required />
                <button type="submit">Connect</button>
            </form>
            <p class="boot-error" id="boot-error" hidden></p>
            <p class="boot-hint">Press the BACK key to exit.</p>
        </div>
    </div>
    <div id="hsb-status" class="hsb-hidden"></div>
    <script>
        // JEL-2040 HSB bootloader.
        // Order:
        //   1. Read jellyfin.shell.serverUrl from localStorage.
        //   2. If absent → show connect form; on submit normalize + save the
        //      URL and load the shell IN PLACE (JEL-115: never location.reload —
        //      the post-submit reload black-screened the Tizen 5.0/M63 webview
        //      on fresh installs, and in-place load makes first-connect take
        //      the same code path as every later boot).
        //   3. If present → fetch ${server}/shell/manifest.json with 3s timeout.
        //      - Use manifest.shellUrl when valid; else fall back to
        //        ${server}/shell/shell.min.js with a cache-busting query.
        //   4. <script src> the chosen URL. If it 404s / times out, load the
        //      baked-in boot-shell.min.js so the TV is never stranded.
        // The hosted shell.min.js takes over from here (NativeShell, key map,
        // document.write of /web/, etc.) just like today.
        (function(){
            var SERVER_KEY = 'jellyfin.shell.serverUrl';
            var HSB_VER_KEY = 'jellyfin.shell.hsbCachedVer';
            var HSB_HASH_KEY = 'jellyfin.shell.hsbCachedHash';
            // JEL-622: manifest.shellUrl from the last good manifest ('' when
            // that manifest carried none), so the warm path below can rebuild
            // the exact shell URL without a blocking manifest RTT.
            var HSB_SHELL_URL_KEY = 'jellyfin.shell.hsbCachedShellUrl';
            // JELA-66: hosted-shell byte cache. When the cached manifest sha
            // is unchanged, the shell executes straight from these persisted
            // bytes — zero network on the shell critical path (the ?v=<sha>
            // script URL is HTTP-cacheable, but Tizen evicts its ~50 MB HTTP
            // cache on power-cycle/Defender wipes, so a hash-unchanged boot
            // could still pay a full serial shell download). The manifest
            // keeps revalidating in the background, exactly as before, so a
            // NEW sha is adopted on the next boot. The record is dropped on
            // any integrity failure (length + fnv1a checksum) and the body
            // must have parsed on THIS engine at store time (new Function
            // syntax check), so a truncated/corrupt body can never brick the
            // boot — every failure falls back to today's network path.
            // Kill switch: localStorage['jellyfin.shell.hsbShellLsDisabled']='1'.
            // QA surface: window.__hsbShellLs {st:'hit'|'miss'|'off'|'err', b, sha}.
            var HSB_SHELL_BODY_KEY = 'jellyfin.shell.hsbShellBody';
            var HSB_SHELL_LS_DISABLED_KEY = 'jellyfin.shell.hsbShellLsDisabled';
            var HSB_SHELL_BODY_MAX = 262144; // 256 KB (shell.min.js ~175 KB today)
            // Store-attempt schedule: first try from the script onload, then
            // two delayed retries that outlive the shell's doc.write (which
            // aborts the old document's in-flight fetches — see storeShellBody).
            var HSB_STORE_RETRY_MS = [0, 12000, 30000];
            var HSB_DEBUG_KEY = 'jellyfin.shell.hsbDebug';
            // JEL-332: the true installed bootstrap version. MUST equal the
            // config.xml widget version (the single source of truth that
            // build_bootstrap.py copies verbatim into manifest.bootstrap.json).
            // selftest.cjs asserts this equality so it can never silently drift
            // again. The AC3 overlay codename lives in HSB_CODENAME so it stays
            // on the diagnostic label without polluting the version itself.
            var HSB_VERSION = '2.0.23';
            var HSB_CODENAME = 'ac3';
            // Composite label shown on the overlay tag, e.g. "2.0.18-ac3".
            var HSB_LABEL = HSB_VERSION + (HSB_CODENAME ? '-' + HSB_CODENAME : '');
            var BOOT_BUDGET_MS = 4000;

            // --- AC3 diagnostic overlay -------------------------------------
            var hsbState = { version: HSB_VERSION, codename: HSB_CODENAME,
                             label: HSB_LABEL, ts: new Date().toISOString(),
                             phase: 'boot', server: null, manifestUrl: null,
                             manifestSha: null, shellUrl: null, fallback: null,
                             errors: [] };
            // JEL-22: opt-in, not opt-out. Overlay stays OFF on a fresh retail
            // install (nothing in localStorage) and is shown only when an
            // operator explicitly sets hsbDebug='1' for diagnostics.
            var hsbDebugOn = (function(){
                try { return localStorage.getItem(HSB_DEBUG_KEY) === '1'; }
                catch(_) { return false; }
            })();
            function renderHsb(level) {
                window.__hsbState = hsbState;
                if (!hsbDebugOn) return;
                var el = document.getElementById('hsb-status');
                if (!el) return;
                el.classList.remove('hsb-hidden');
                el.className = 'hsb-' + (level || 'ok');
                while (el.firstChild) el.removeChild(el.firstChild);
                var tag = document.createElement('span');
                tag.className = 'hsb-tag';
                tag.textContent = 'HSB ' + HSB_LABEL + ' / ' + (hsbState.phase || '?');
                el.appendChild(tag);
                el.appendChild(document.createTextNode('\n' + hsbLine().join('\n')));
            }
            function hsbLine() {
                var out = [];
                if (hsbState.server)      out.push('server      = ' + hsbState.server);
                if (hsbState.manifestUrl) out.push('manifestUrl = ' + hsbState.manifestUrl);
                if (hsbState.manifestSha) out.push('manifestSha = ' + hsbState.manifestSha);
                if (hsbState.shellUrl)    out.push('shellUrl    = ' + hsbState.shellUrl);
                if (hsbState.shellLs)     out.push('shellLs     = ' + hsbState.shellLs);
                if (hsbState.fallback)    out.push('fallback    = ' + hsbState.fallback);
                if (hsbState.errors.length) out.push('errors      = ' + hsbState.errors.join(' | '));
                return out;
            }
            function hsbPhase(phase, level) {
                hsbState.phase = phase;
                renderHsb(level || 'ok');
            }
            hsbPhase('boot', 'ok');

            function showConnectForm(msg) {
                var root = document.getElementById('boot-root');
                root.style.display = 'block';
                if (msg) {
                    var err = document.getElementById('boot-error');
                    err.textContent = msg;
                    err.hidden = false;
                }
                // JEL-115: arm (or re-arm after a failed shell load) the
                // first-connect submit path. Once a shell load has started,
                // later submits belong to boot-shell's own connect handler
                // (attachConnectForm), so this handler goes inert.
                window.__hsbConnectStarted = false;
                document.getElementById('server-form').addEventListener('submit', function(e){
                    e.preventDefault();
                    if (window.__hsbConnectStarted) return;
                    var raw = document.getElementById('server-input').value.trim();
                    if (!raw) return;
                    // JEL-115: normalize like boot-shell's normalizeServerUrl —
                    // default bare hosts to http://, strip trailing slashes.
                    if (!/^https?:\/\//i.test(raw)) raw = 'http://' + raw;
                    raw = raw.replace(/\/+$/, '');
                    try { localStorage.setItem(SERVER_KEY, raw); } catch(_){}
                    window.__hsbConnectStarted = true;
                    // JEL-115: load the shell in place instead of
                    // location.reload(). The reload was the one boot step
                    // unique to a fresh install and black-screened the
                    // Tizen 5.0 / Chromium 63 webview; in-place load follows
                    // the exact stored-URL boot path that restarts use.
                    hsbPhase('connect-submit', 'ok');
                    loadHostedShell(raw);
                });
            }

            // --- JELA-66 hosted-shell byte cache ----------------------------
            // fnv1a over charCodes, base-36 — same recipe as the shell's
            // txFnv1a so on-device spot checks can cross-verify checksums.
            function hsbFnv(s) {
                var h = 0x811c9dc5;
                for (var i = 0; i < s.length; i++) {
                    h ^= s.charCodeAt(i);
                    h = (h + ((h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24))) >>> 0;
                }
                return h.toString(36);
            }
            function shellLsDisabled() {
                try { return localStorage.getItem(HSB_SHELL_LS_DISABLED_KEY) === '1'; }
                catch(_) { return true; }
            }
            function readShellBody(sha) {
                // Body record for EXACTLY this sha, integrity-checked; any
                // failure drops the record so the next boot re-stores fresh.
                if (shellLsDisabled()) {
                    window.__hsbShellLs = { st: 'off' };
                    return null;
                }
                var rec = null;
                try { rec = JSON.parse(localStorage.getItem(HSB_SHELL_BODY_KEY)); }
                catch(_) { rec = null; }
                if (!rec || rec.v !== 1 || rec.sha !== sha
                    || typeof rec.body !== 'string' || !rec.body.length) return null;
                if (rec.body.length !== rec.len || hsbFnv(rec.body) !== rec.h) {
                    try { localStorage.removeItem(HSB_SHELL_BODY_KEY); } catch(_){}
                    return null;
                }
                return rec;
            }
            function execShellFromLs(rec) {
                // Inline <script> executes synchronously on appendChild — the
                // shell is a self-contained IIFE (no document.currentScript
                // dependence), so this is behavior-identical to <script src>.
                hsbState.manifestSha = rec.sha;
                hsbPhase('shell-ls-hit', 'ok');
                try {
                    var s = document.createElement('script');
                    s.text = rec.body;
                    document.head.appendChild(s);
                    window.__hsbShellUrl = rec.url;
                    window.__hsbShellLs = { st: 'hit', b: rec.body.length, sha: rec.sha };
                    hsbState.shellUrl = rec.url;
                    hsbState.shellLs = 'hit b=' + rec.body.length;
                    hsbPhase('shell-ls-loaded', 'ok');
                    return true;
                } catch (e) {
                    try { localStorage.removeItem(HSB_SHELL_BODY_KEY); } catch(_){}
                    hsbState.errors.push('shell-ls-exec:' + ((e && e.message) || e));
                    hsbState.shellLs = 'err';
                    window.__hsbShellLs = { st: 'err' };
                    return false;
                }
            }
            function storeShellBody(url, sha) {
                // Background, best-effort: refetch the just-loaded pinned URL
                // as text (same stable ?v=<sha> URL the engine just cached)
                // and persist it for the next boot. Never on the critical
                // path; every failure just means the next boot loads over the
                // network like today.
                //
                // JELA-66 on-device finding (QN90B): the shell doc.writes the
                // /web/ client shortly after it executes, and document.open()
                // ABORTS in-flight fetches of the old document — so a single
                // fetch kicked from the script onload silently dies every
                // boot and the record is never written. Timers are window-
                // level and survive the doc.write, so failed attempts are
                // retried on a delay; by then the rewritten document is
                // settled and the fetch completes (verified live over CDP).
                if (!sha || shellLsDisabled() || typeof fetch !== 'function') return;
                if (window.__hsbShellStorePending) return; // one chain at a time
                window.__hsbShellStorePending = true;
                // Test hook: the selftest sandbox shrinks these delays.
                var delays = window.__hsbStoreRetryMs || HSB_STORE_RETRY_MS;
                var attempt = 0;
                function fail(why) {
                    attempt++;
                    if (attempt >= delays.length) {
                        hsbState.shellLs = 'store-failed:' + why;
                        // Unlock so a later safety kick can try a fresh chain.
                        window.__hsbShellStorePending = false;
                        return;
                    }
                    hsbState.shellLs = 'store-retry' + attempt + ':' + why;
                    try { setTimeout(run, delays[attempt]); }
                    catch(_) { window.__hsbShellStorePending = false; }
                }
                function run() {
                    var cur = null;
                    try { cur = JSON.parse(localStorage.getItem(HSB_SHELL_BODY_KEY)); }
                    catch(_) { cur = null; }
                    if (cur && cur.v === 1 && cur.sha === sha) {
                        window.__hsbShellStorePending = false;
                        return; // already stored
                    }
                    try {
                        fetch(url, { credentials: 'omit' })
                            .then(function(r){ return (r && r.ok) ? r.text() : null; })
                            .then(function(body){
                                if (typeof body !== 'string' || body.length < 1024
                                    || body.length > HSB_SHELL_BODY_MAX) { fail('body'); return; }
                                // Syntax-check on THIS engine (not called) before
                                // the body may ever replace the network load.
                                try { new Function(body); } catch(_) { fail('syntax'); return; }
                                var rec = { v: 1, sha: sha, url: url, len: body.length,
                                            h: hsbFnv(body), ts: Date.now(), body: body };
                                try {
                                    localStorage.setItem(HSB_SHELL_BODY_KEY, JSON.stringify(rec));
                                    hsbState.shellLs = 'stored b=' + body.length;
                                    window.__hsbShellStorePending = false;
                                } catch(_) {
                                    // Quota — make sure no stale record lingers.
                                    try { localStorage.removeItem(HSB_SHELL_BODY_KEY); } catch(__){}
                                    fail('quota');
                                }
                            })
                            .catch(function(){ fail('fetch'); });
                    } catch(_) { fail('fetch'); }
                }
                run();
            }

            function appendScript(src, onload, onerror) {
                var s = document.createElement('script');
                s.src = src;
                s.async = false;
                s.onload = onload;
                s.onerror = onerror;
                document.head.appendChild(s);
                return s;
            }

            function loadBakedFallback(reason) {
                try { console.warn('[hsb] falling back to baked shell:', reason); } catch(_){}
                window.__hsbFallback = reason || 'unknown';
                hsbState.fallback = reason || 'unknown';
                hsbPhase('fallback', 'warn');
                appendScript('boot-shell.min.js',
                    function(){ hsbPhase('baked-shell-loaded', 'warn'); },
                    function(){
                        hsbState.errors.push('baked-load-failed');
                        hsbPhase('baked-load-failed', 'err');
                        showConnectForm('Shell load failed (' + reason + '). Check server URL.');
                    });
            }

            // JEL-125: overlap the heavy boot inputs with the manifest-probe →
            // hosted-404 → baked-shell chain instead of serializing after it.
            // boot-shell (and the hosted shell) already adopt an in-flight
            // window.__shellPrefetch when its baseUrl matches (JEL-58 pattern
            // from shell-tizen's index.html); the bootstrap just never primed
            // it, so every boot paid the /web/ RTT pair only after the baked
            // shell was parsed. Also kick the 2.4 MB babel fetch+parse on
            // legacy engines where a transpile is unlearned-or-known-needed —
            // on a fresh first connect the verdict is unlearned and babel
            // otherwise loads lazily inside the pre-write critical path.
            function primeWebBoot(server) {
                try {
                    if (typeof fetch === 'function') {
                        var webBase = server + '/web/';
                        var init = { credentials: 'omit' };
                        // Last submit wins: boot-shell ignores a stale prefetch
                        // via its baseUrl equality check, but re-priming here
                        // keeps the common retry path warm too.
                        window.__shellPrefetch = {
                            baseUrl: webBase,
                            index: fetch(webBase + 'index.html', init),
                            config: fetch(webBase + 'config.json', init)
                        };
                    }
                } catch(_){}
                try {
                    if (localStorage.getItem('jellyfin.shell.legacy.babelPrime') === '0') return;
                } catch(_){}
                try {
                    var ua = navigator.userAgent || '';
                    var m = /(?:Chrome|Chromium)\/(\d+)\./.exec(ua);
                    var legacy = !!(m && parseInt(m[1], 10) < 70);
                    if (!legacy) { try { new Function('var a={};return a?.b'); } catch(_) { legacy = true; } }
                    if (!legacy) return;
                    var verdict = null, streak = 0;
                    try { verdict = localStorage.getItem('jellyfin.shell.legacy.babelNeeded'); } catch(_){}
                    try { streak = parseInt(localStorage.getItem('jellyfin.shell.legacy.babelUnusedStreak') || '0', 10) || 0; } catch(_){}
                    // Unlearned verdict (fresh install) or learned-needed with a
                    // live streak — mirror shell.js's JEL-1984 prime predicate,
                    // extended to the unlearned case this ticket is about.
                    if (verdict !== '1' && verdict !== null) return;
                    if (verdict === '1' && streak >= 2) return;
                    // Defer one tick: on the stored-URL path this runs while the
                    // bootloader <script> is still parsing, before the IIFE below
                    // has defined window.__ensureBabel.
                    setTimeout(function(){
                        try {
                            if (typeof window.__ensureBabel === 'function') window.__ensureBabel();
                        } catch(_){}
                    }, 0);
                } catch(_){}
            }

            function loadHostedShell(server) {
                primeWebBoot(server);
                var base = server.replace(/\/+$/, '') + '/shell/';
                hsbState.server = server;
                hsbState.manifestUrl = base + 'manifest.json';
                hsbPhase('fetch-manifest', 'ok');
                var done = false;
                var timer = setTimeout(function(){
                    if (done) return;
                    done = true;
                    loadBakedFallback('timeout');
                }, BOOT_BUDGET_MS);

                // Manifest probe is best-effort; if it fails fast, jump directly
                // to the unversioned shell.min.js with a cache-buster.
                // `sha` (JELA-66) is the content identity of `url` when known
                // (?v=<sha> pinned loads); it keys the background byte-store
                // so the NEXT boot can execute from localStorage. ?t= busted
                // loads have no identity and are never stored.
                function loadShellAt(url, sha) {
                    hsbState.shellUrl = url;
                    hsbPhase('load-shell', 'ok');
                    // Safety kick: if the onload-driven store chain died (or
                    // onload itself was lost to the doc.write), try once more
                    // from a long timer — storeShellBody no-ops when a valid
                    // record already exists or a chain is still in flight.
                    if (sha) {
                        var kickMs = (window.__hsbStoreRetryMs && 4 * window.__hsbStoreRetryMs[
                            window.__hsbStoreRetryMs.length - 1]) || 45000;
                        try { setTimeout(function(){ storeShellBody(url, sha); }, kickMs); }
                        catch(_){}
                    }
                    appendScript(url,
                        function(){
                            // JELA-66: store BEFORE the done-race guard. On a
                            // slow network the 4 s boot budget can fire first
                            // (done=true, baked fallback appended) while this
                            // hosted script still loads+executes late — those
                            // are exactly the boots the byte cache must learn
                            // from, so the NEXT boot is instant from LS and
                            // never re-races the budget timer. (QN90B/WAN
                            // finding: fallback:timeout every boot, so the
                            // guarded store never ran.)
                            storeShellBody(url, sha);
                            if (done) return;
                            done = true; clearTimeout(timer);
                            window.__hsbShellUrl = url;
                            hsbPhase('shell-loaded', 'ok');
                        },
                        function(){
                            if (done) return;
                            done = true; clearTimeout(timer);
                            hsbState.errors.push('script-error:' + url);
                            loadBakedFallback('script-error');
                        }
                    );
                }

                // Fetch manifest.json and persist its version/sha256/shellUrl
                // as the last-good manifest. Calls onSettled(manifest|null)
                // exactly once; LS is updated even when the caller no longer
                // cares (warm-path background revalidation).
                function fetchManifest(onSettled) {
                    try {
                        var xhr = new XMLHttpRequest();
                        xhr.open('GET', base + 'manifest.json?_=' + Date.now(), true);
                        xhr.timeout = 1500;
                        xhr.onload = function(){
                            var m = null;
                            if (xhr.status >= 200 && xhr.status < 300) {
                                try {
                                    m = JSON.parse(xhr.responseText);
                                    if (m && typeof m.version === 'string') {
                                        try { localStorage.setItem(HSB_VER_KEY, m.version); } catch(_){}
                                    }
                                    if (m && typeof m.sha256 === 'string') {
                                        try { localStorage.setItem(HSB_HASH_KEY, m.sha256); } catch(_){}
                                        try {
                                            localStorage.setItem(HSB_SHELL_URL_KEY,
                                                (typeof m.shellUrl === 'string' && m.shellUrl) ? m.shellUrl : '');
                                        } catch(_){}
                                        hsbState.manifestSha = m.sha256;
                                    }
                                } catch(e){
                                    m = null;
                                    hsbState.errors.push('manifest-parse:' + (e && e.message || e));
                                }
                            } else {
                                hsbState.errors.push('manifest-http-' + xhr.status);
                            }
                            onSettled(m);
                        };
                        xhr.onerror = xhr.ontimeout = function(){
                            hsbState.errors.push('manifest-' + (xhr.status === 0 ? 'neterr' : 'timeout'));
                            onSettled(null);
                        };
                        xhr.send();
                    } catch(_) {
                        onSettled(null);
                    }
                }

                // JEL-622 warm path: a prior boot cached the manifest's sha256
                // (and shellUrl). Load the version-pinned shell URL immediately
                // — the manifest RTT (up to 1.5 s of the 4 s boot budget) is
                // off the critical path, and an UNCHANGED shell.min.js is
                // served from the engine's HTTP cache instead of being
                // re-downloaded every boot (`?v=<hash>` is a stable URL,
                // unlike the old `?t=Date.now()` buster). The manifest still
                // revalidates in the background so the NEXT boot adopts a new
                // build — same stale-while-revalidate contract as the /web/
                // body cache. If the pinned URL 404s/errors, the existing
                // onerror → baked-fallback path still catches it.
                var cachedSha = null, cachedShellUrl = null;
                try {
                    cachedSha = localStorage.getItem(HSB_HASH_KEY);
                    cachedShellUrl = localStorage.getItem(HSB_SHELL_URL_KEY);
                } catch(_){}
                if (cachedSha) {
                    hsbState.manifestSha = cachedSha;
                    // Background revalidation for the NEXT boot — fires on
                    // both subpaths below, before any shell bytes execute.
                    fetchManifest(function(){});
                    // JELA-66: hash unchanged since the last adopted boot →
                    // execute the persisted shell bytes directly. Zero
                    // network on the shell critical path; survives the HTTP
                    // cache eviction that made hash-unchanged boots re-pay
                    // the shell download.
                    var lsRec = readShellBody(cachedSha);
                    if (lsRec && execShellFromLs(lsRec)) {
                        done = true; clearTimeout(timer);
                        return;
                    }
                    if (!window.__hsbShellLs) window.__hsbShellLs = { st: 'miss' };
                    hsbPhase('manifest-cache-hit', 'ok');
                    loadShellAt((cachedShellUrl || (base + 'shell.min.js'))
                        + '?v=' + encodeURIComponent(cachedSha), cachedSha);
                    return;
                }

                // Cold path (no last-good manifest yet): probe the manifest
                // first; if it fails fast, fall back to the unversioned
                // shell.min.js with a cache-buster, exactly as before.
                fetchManifest(function(m){
                    if (done) return;
                    if (m) {
                        var u = (typeof m.shellUrl === 'string' && m.shellUrl) || (base + 'shell.min.js');
                        var v = m.sha256 ? ('?v=' + encodeURIComponent(m.sha256)) : ('?t=' + Date.now());
                        loadShellAt(u + v, m.sha256 || null);
                        return;
                    }
                    loadShellAt(base + 'shell.min.js?t=' + Date.now());
                });
            }

            var server;
            try { server = localStorage.getItem(SERVER_KEY); } catch(_){}
            if (!server) {
                hsbPhase('no-server-url', 'warn');
                showConnectForm();
                return;
            }
            loadHostedShell(server);
        })();
    </script>
    <!-- JEL-18: wire the shipped babel.min.js into the shell's lazy transpile path.
         boot-shell.min.js (and the hosted shell) call window.__ensureBabel() the
         first time a server-injected plugin script needs transpiling for the legacy
         Tizen 5.0 / Chromium M63 engine. Without this hook window.Babel stays
         undefined and every plugin transpile is skipped ("babel not available,
         skip transpile"), so plugins that run in a desktop browser silently fail
         on the TV (M63 cannot run optional-chaining/nullish/spread raw). We inject
         the baked-in babel.min.js (babel-standalone, ~2.4 MB) strictly ON DEMAND —
         never at boot — so there is zero cost unless a legacy plugin actually needs
         transpiling. Placed after the bootloader so the selftest's first-<script>
         bootloader extraction is unaffected; all inline scripts execute
         synchronously before the async-loaded shell ever calls this hook. ES5-only
         so it parses on M63. -->
    <script>
    (function(){
        var BABEL_SRC = 'babel.min.js'; // sibling of index.html inside the WGT
        var pending = null;             // cached load promise: load babel at most once
        window.__ensureBabel = function(){
            // Already present (e.g. a prior call finished) -> nothing to do.
            if (typeof window.Babel !== 'undefined') return Promise.resolve();
            if (pending) return pending;
            pending = new Promise(function(resolve){
                // JEL-125: settle through one funnel. The eager prime kick can
                // race document.open()/write() — the written document discards
                // a still-pending <script> WITHOUT firing onload/onerror, which
                // would leave this promise unsettled forever and hang every
                // later transpile that awaits it. A window.Babel poll catches a
                // parse that completed without its event, and a 10 s give-up
                // settles the discarded case (callers re-check window.Babel and
                // skip-transpile, same as today's load-failure path).
                var settled = false, poll = null, giveUp = null;
                function settle(){
                    if (settled) return;
                    settled = true;
                    if (poll) clearInterval(poll);
                    if (giveUp) clearTimeout(giveUp);
                    if (typeof window.Babel === 'undefined') pending = null; // allow a later retry
                    resolve(); // ensureBabelReady() re-checks window.Babel
                }
                try {
                    var s = document.createElement('script');
                    s.src = BABEL_SRC;
                    s.onload = function(){
                        try { console.warn('shell: babel loaded for legacy transpile'); } catch(_){}
                        settle();
                    };
                    s.onerror = function(){
                        try { console.warn('shell: babel.min.js failed to load'); } catch(_){}
                        settle();
                    };
                    document.head.appendChild(s);
                    poll = setInterval(function(){
                        if (typeof window.Babel !== 'undefined') settle();
                    }, 250);
                    giveUp = setTimeout(settle, 10000);
                } catch (e) {
                    settle();
                }
            });
            return pending;
        };
    })();
    </script>
</body>
