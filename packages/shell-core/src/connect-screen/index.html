<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jellyfin - Connect to your server</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      body {
        margin: 0;
        height: 100vh;
        display: grid;
        place-items: center;
        background: #101010;
        color: #fafafa;
      }
      .card {
        width: min(640px, 80vw);
        padding: 4rem;
        background: #1c1c1c;
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }
      h1 {
        margin: 0 0 1rem;
        font-size: 2.25rem;
      }
      p {
        margin: 0 0 2rem;
        color: #b8b8b8;
      }
      input,
      button {
        width: 100%;
        padding: 1rem 1.25rem;
        font-size: 1.25rem;
        border-radius: 8px;
        border: 2px solid #333;
        background: #0e0e0e;
        color: #fafafa;
        box-sizing: border-box;
      }
      input:focus,
      button:focus {
        outline: none;
        border-color: #00a4dc;
        box-shadow: 0 0 0 4px rgba(0, 164, 220, 0.3);
      }
      button {
        margin-top: 1rem;
        background: #00a4dc;
        border-color: #00a4dc;
        color: #fff;
        cursor: pointer;
      }
      .error {
        margin-top: 1rem;
        color: #ff6b6b;
        min-height: 1.5em;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Connect to Jellyfin</h1>
      <p>
        Enter the address of your Jellyfin server. We will load its web client
        from <code>${server}/web/</code>.
      </p>
      <form id="connect">
        <input
          id="server-url"
          type="url"
          placeholder="http://192.168.1.10:8096"
          autocomplete="url"
          required
        />
        <button id="submit" type="submit">Connect</button>
      </form>
      <div id="error" class="error" role="alert"></div>
    </main>
    <script type="module" src="./connect.js"></script>
  </body>
</html>
