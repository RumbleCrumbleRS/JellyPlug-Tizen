# CI: lint + typecheck + per-platform build matrix.
#
# Triggered on PRs and pushes to main. Path filters keep webOS/Android jobs
# from running on Tizen-only changes (and vice versa). shell-core changes
# fan out to all platforms.
#
# This workflow is drafted but NOT enabled - it has no remote yet (see
# repo-structure section 9). Once the repo is pushed to GitHub it activates
# automatically.

name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run format:check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  build-core:
    name: build shell-core
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @jellyfin-tv/shell-core build
      - uses: actions/upload-artifact@v4
        with:
          name: shell-core-dist
          path: packages/shell-core/dist

  build-tizen:
    name: build shell-tizen
    runs-on: ubuntu-latest
    needs: [build-core]
    env:
      TIZEN_STUDIO_VER: "5.6"
    steps:
      - uses: actions/checkout@v4

      # Tizen Studio's CLI runs on the JVM; pin a JDK the tooling supports
      # rather than relying on whatever the runner image defaults to.
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Install the official Samsung Web CLI directly on ubuntu-latest. The old
      # prebuilt container image never existed (manifest unknown / 404), so this
      # job had never passed. Mirrors bootstrap-sign.yml (JEL-11 / 721c65b).
      - name: Install Tizen Studio Web CLI
        run: |
          set -euo pipefail
          ver="${TIZEN_STUDIO_VER}"
          url="https://download.tizen.org/sdk/Installer/tizen-studio_${ver}/web-cli_Tizen_Studio_${ver}_ubuntu-64.bin"
          echo "Downloading Tizen Studio Web CLI ${ver} from ${url}"
          curl -fSL --retry 3 -o tizen-installer.bin "$url"
          chmod +x tizen-installer.bin
          # --accept-license is required for unattended install.
          ./tizen-installer.bin --accept-license "${HOME}/tizen-studio"
          rm -f tizen-installer.bin
          # Persist the CLI on PATH for every subsequent step.
          echo "${HOME}/tizen-studio/tools/ide/bin" >> "$GITHUB_PATH"

      - name: Verify tizen CLI is on PATH
        run: tizen version

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # `tizen package` always signs and fails without an active profile (there
      # is no unsigned mode), so mint a throwaway self-signed author cert for
      # the build. Deliberately decoupled from the release signing secrets: the
      # retail, TV-installable .wgt is bootstrap-sign.yml's job. The artifact
      # below is TEST-signed — good for verifying the build/package pipeline and
      # the emulator, not for installing on a retail TV.
      - name: Configure ephemeral CI signing profile
        run: tooling/ci/configure-tizen-ci-cert.sh

      - name: Build .wgt
        env:
          SIGNING_PROFILE: ci
        run: pnpm --filter @jellyfin-tv/shell-tizen build
      # Tizen's signer writes its real error to cli.log, not stdout, so surface
      # the tail on failure to keep build/signing breakage diagnosable from the
      # Actions log alone (no key material is printed).
      - name: Dump tizen cli.log on failure
        if: failure()
        run: |
          tizen security-profiles list || true
          find "$HOME" -name cli.log -exec tail -n 80 {} + 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: jellyfin-tv-shell-tizen-${{ github.sha }}
          path: packages/shell-tizen/dist/*.wgt*

  build-webos:
    name: build shell-webos
    runs-on: ubuntu-latest
    needs: [build-core]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install ares-cli
        run: npm i -g @webosose/ares-cli
      - name: Build .ipk
        run: pnpm --filter @jellyfin-tv/shell-webos build
      - uses: actions/upload-artifact@v4
        with:
          name: jellyfin-tv-shell-webos-${{ github.sha }}
          path: packages/shell-webos/dist/*.ipk*

  build-android:
    name: build shell-android
    runs-on: ubuntu-latest
    needs: [lint] # Android build is independent of TS workspace
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Build debug APK
        working-directory: packages/shell-android
        run: |
          # Stubbed until M5 lands the real Gradle project.
          mkdir -p app/build/outputs/apk/debug
          echo "android build placeholder - M5" > app/build/outputs/apk/debug/jellyfin-tv-shell.apk.placeholder
      - uses: actions/upload-artifact@v4
        with:
          name: jellyfin-tv-shell-android-${{ github.sha }}
          path: packages/shell-android/app/build/outputs/apk/debug/*
