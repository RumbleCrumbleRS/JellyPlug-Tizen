# CI: format gate + Tizen test/build.
#
# Triggered on PRs and pushes to main. This repo is Tizen-only: the format
# gate covers the whole tree, the test gate runs every package's test script,
# and build-tizen packages + signs the .wgt.
#
# This workflow is drafted but NOT enabled - it has no remote yet (see
# repo-structure section 9). Once the repo is pushed to GitHub it activates
# automatically.

name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test

  verify-artifacts:
    name: verify committed .wgt are signed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Every committed .wgt must be signed (JEL-8 guard)
        # A retail Tizen TV refuses to install an unsigned package. Fail CI if
        # any committed widget lacks author + distributor signatures, so we can
        # never re-commit an unsigned .wgt the way the HSB bootstrap once was.
        run: |
          shopt -s globstar nullglob
          wgts=(release-artifacts/**/*.wgt)
          if [[ ${#wgts[@]} -eq 0 ]]; then
            echo "No committed .wgt found — nothing to verify."
            exit 0
          fi
          tooling/ci/verify-wgt-signed.sh "${wgts[@]}"

  verify-shell-source:
    name: verify shell sources match deployed artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      # Install the workspace so the guard canonicalizes through the
      # lockfile-pinned esbuild instead of an ad-hoc `npx --yes` download
      # (JEL-119 supply-chain hardening).
      - run: pnpm install --frozen-lockfile
      - name: boot-shell.src.js must match boot-shell.min.js (JEL-24 guard)
        # The deployed bootstrap shell (boot-shell.min.js) once had NO committed
        # source, so it silently drifted ahead of the repo (JEL-23). JEL-24
        # de-minified it into boot-shell.src.js. This guard proves the two stay
        # semantically equivalent (both canonicalized through the same esbuild),
        # so an edit to one without the other can never silently ship again.
        run: python3 packages/shell-tizen-bootstrap/scripts/verify_boot_shell_src.py
      - name: shell.js must match shell.min.js (JEL-120 guard)
        # Same property for the main shell: shell.min.js is a release-time
        # esbuild build of shell.js that build-wgt.sh ships as committed, so a
        # blob-only (or source-only) edit would ship silently. The guard
        # forward-builds shell.js through build_shell_min's own substitution
        # logic (__BABEL_FPR__/__SHELL_VER__/__QA_BEACON_BODY__), strips the
        # breadcrumb manifest from the blob, and canonicalizes both sides
        # through the same esbuild before comparing.
        run: python3 packages/shell-tizen/scripts/verify_shell_src.py

  build-tizen:
    name: build shell-tizen
    runs-on: ubuntu-latest
    needs: [format, test]
    env:
      TIZEN_STUDIO_VER: "5.6"
      # SHA256 of web-cli_Tizen_Studio_5.6_ubuntu-64.bin as served by
      # download.tizen.org on 2026-06-10 (JEL-119). Samsung publishes no
      # checksums, so this pins the binary CI has been installing all along —
      # a silent swap upstream (or a MITM) now fails the build instead of
      # executing an unverified installer. Bumping TIZEN_STUDIO_VER requires
      # re-pinning this hash.
      TIZEN_INSTALLER_SHA256: "89c84fbc474dcfb02af193bcc763e2e7bf3259bf34cbf6b7f44ec2da024db7df"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # NB: we deliberately do NOT pin Temurin JDK 17 here. `tizen package`
      # reads Tizen's bundled distributor signer (tizen-distributor-signer.p12),
      # a legacy-format PKCS#12. Modern JDKs (17) can't read that legacy
      # algorithm and fail signing with a misleading
      # "CertificationException: Invaild password" — regardless of the author
      # cert. The Tizen CLI must run on the Java it ships with (Java 8 vintage),
      # which is wired up below after install. (JEL-14)

      # Install the official Samsung Web CLI directly on ubuntu-latest. The old
      # prebuilt container image never existed (manifest unknown / 404), so this
      # job had never passed. Mirrors bootstrap-sign.yml (JEL-11 / 721c65b).
      - name: Install Tizen Studio Web CLI
        run: |
          set -euo pipefail
          ver="${TIZEN_STUDIO_VER}"
          url="https://download.tizen.org/sdk/Installer/tizen-studio_${ver}/web-cli_Tizen_Studio_${ver}_ubuntu-64.bin"
          echo "Downloading Tizen Studio Web CLI ${ver} from ${url}"
          curl -fSL --retry 3 -o tizen-installer.bin "$url"
          echo "${TIZEN_INSTALLER_SHA256}  tizen-installer.bin" | sha256sum -c -
          chmod +x tizen-installer.bin
          # --accept-license is required for unattended install.
          ./tizen-installer.bin --accept-license "${HOME}/tizen-studio"
          rm -f tizen-installer.bin
          # Persist the CLI on PATH for every subsequent step.
          echo "${HOME}/tizen-studio/tools/ide/bin" >> "$GITHUB_PATH"

      # Point the toolchain at Tizen Studio's OWN bundled JRE. This is the Java
      # the signer was built/tested against, so it reads the legacy distributor
      # p12 that JDK 17 chokes on. Locate java robustly (path varies by version)
      # and export JAVA_HOME for every later step.
      - name: Use Tizen's bundled JRE
        run: |
          set -euo pipefail
          java_bin="$(find "${HOME}/tizen-studio/jdk" -type f -name java -path '*/bin/java' 2>/dev/null | head -1)"
          if [[ -z "$java_bin" ]]; then
            echo "ERROR: could not locate Tizen's bundled JRE under tizen-studio/jdk" >&2
            find "${HOME}/tizen-studio" -name java -path '*/bin/*' 2>/dev/null | head || true
            exit 1
          fi
          java_home="$(dirname "$(dirname "$java_bin")")"
          echo "Using bundled JRE at: $java_home"
          echo "JAVA_HOME=${java_home}" >> "$GITHUB_ENV"
          echo "${java_home}/bin" >> "$GITHUB_PATH"

      - name: Verify tizen CLI + bundled Java
        run: |
          java -version
          tizen version

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Tizen encrypts security-profile passwords through libsecret/gnome-keyring
      # over D-Bus. A headless runner has neither, so `security-profiles add`
      # silently fails to persist the passwords (it records .pwd paths it never
      # writes) and `tizen package` then signs with an empty password, dying with
      # "CertificationException: Invaild password". Provide a keyring. (JEL-14)
      - name: Install gnome-keyring for Tizen secure storage
        run: sudo apt-get update && sudo apt-get install -y gnome-keyring dbus-x11 libsecret-1-0

      # `tizen package` always signs and fails without an active profile (there
      # is no unsigned mode), so mint a throwaway self-signed author cert for
      # the build. Deliberately decoupled from the release signing secrets: the
      # retail, TV-installable .wgt is bootstrap-sign.yml's job. The artifact
      # below is TEST-signed — good for verifying the build/package pipeline and
      # the emulator, not for installing on a retail TV.
      #
      # Profile-add and packaging MUST share one D-Bus/keyring session for the
      # encrypted passwords to round-trip, so run both inside a single
      # dbus-run-session with an unlocked (empty-password) login keyring.
      - name: Configure signing profile + build .wgt (keyring session)
        env:
          SIGNING_PROFILE: ci
        run: |
          dbus-run-session -- bash -euo pipefail -c '
            echo "" | gnome-keyring-daemon --unlock --components=secrets,pkcs11 >/dev/null 2>&1 || true
            tooling/ci/configure-tizen-ci-cert.sh
            pnpm --filter @jellyfin-tv/shell-tizen build
          '
      # Tizen's signer writes its real error to cli.log, not stdout, so surface
      # the tail on failure to keep build/signing breakage diagnosable from the
      # Actions log alone (no key material is printed).
      - name: Dump tizen cli.log on failure
        if: failure()
        run: |
          echo "=== security-profiles list ==="
          tizen security-profiles list || true
          echo "=== cli-config (profiles.path etc.) ==="
          tizen cli-config --list || true
          echo "=== profiles.xml (base64; throwaway CI cert, decode to inspect) ==="
          find "$HOME" -path '*tizen-studio-data/profile/profiles.xml' -exec echo "--- {} ---" \; -exec base64 -w0 {} \; -exec echo \; 2>/dev/null || true
          echo "=== .pwd files present ==="
          find "$HOME/tizen-studio" "$HOME/tizen-studio-data" "$HOME/.tizen-ci-cert" -name '*.pwd' 2>/dev/null | while read -r f; do echo "EXISTS: $f"; done
          echo "=== distributor dirs ==="
          ls -la "$HOME/tizen-studio/tools/certificate-generator/certificates/distributor/" 2>/dev/null || echo "(install distributor dir missing)"
          ls -la "$HOME/tizen-studio-data/tools/certificate-generator/certificates/distributor/" 2>/dev/null || echo "(data distributor dir missing)"
          echo "=== cli.log tail ==="
          find "$HOME" -name cli.log -exec tail -n 80 {} + 2>/dev/null || true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jellyfin-tv-shell-tizen-${{ github.sha }}
          path: packages/shell-tizen/dist/*.wgt*
