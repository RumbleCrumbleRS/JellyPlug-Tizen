# Sign + release the HSB bootstrap WGT (JEL-10).
#
# Produces TWO signed WGTs (author-signature.xml + signature1.xml) that a
# retail Tizen TV will install — the artifacts JEL-7's physical-device
# validation and JEL-8's signed-release guard both depend on (JEL-143):
#   - JellyPlug.wgt        retail, both diagnostic overlays opt-in (off).
#   - JellyPlug-Debug.wgt  debug, both overlays seeded on for every boot.
#
# Pipeline (the three scripts landed in 4370dec, this just wires them):
#   0. Install the Tizen Studio Web CLI on the runner so `tizen`
#      (security-profiles, package) is on PATH. We install the official
#      Samsung Web CLI directly on ubuntu-latest rather than relying on a
#      prebuilt container image — the canonical jellyfin-tizen project ships
#      no CI image, and the community builders (e.g. jeppevinkel) install the
#      Web CLI the same way. (JEL-11: the old `ghcr.io/jellyfin/tizen-studio`
#      image reference never existed, so every run failed at container init.)
#   1. tooling/ci/configure-tizen-signing.sh   builds the Tizen security
#      profile "jellyfin" from the 4 CI secrets (set per JEL-9, Option 1).
#   2. build_bootstrap.py --sign-profile jellyfin   signs JellyPlug.wgt, then
#      build_bootstrap.py --debug --sign-profile jellyfin signs
#      JellyPlug-Debug.wgt (both in the same keyring session).
#   3. tooling/ci/verify-wgt-signed.sh   fails the run if EITHER output is
#      unsigned, so we can never publish an uninstallable package.
#
# Triggers:
#   - workflow_dispatch  — sign on demand from the Actions tab.
#   - push tag bootstrap-v*  — sign + publish a GitHub Release for the tag.
#
# Requires the 4 secrets below. Without TIZEN_AUTHOR_P12_BASE64 the configure
# step is a no-op and the verify step then fails the run (by design) rather
# than silently shipping an unsigned package.

name: bootstrap-sign

on:
  workflow_dispatch:
  push:
    tags:
      - "bootstrap-v*"

jobs:
  sign:
    name: sign bootstrap .wgt
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TIZEN_STUDIO_VER: "5.6"
      # SHA256 of web-cli_Tizen_Studio_5.6_ubuntu-64.bin as served by
      # download.tizen.org on 2026-06-10 (JEL-119; must stay in sync with
      # ci.yml). Fails the run if the installer bytes ever change upstream.
      TIZEN_INSTALLER_SHA256: "89c84fbc474dcfb02af193bcc763e2e7bf3259bf34cbf6b7f44ec2da024db7df"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Policy gate (JEL-173 / JEL-162 Decision 2 "bless-internal"):
      # JellyPlug-Tizen-internal (private) is the canonical signing/release
      # path; the public jellyplug/JellyPlug-Tizen repo is source-only and lost
      # its 4 TIZEN_* secrets in the JEL-145 rebuild. Without those secrets this
      # job would build an UNSIGNED .wgt the locked TV refuses. Fail fast here —
      # with a pointer to the internal repo — so a release run can never
      # silently regress onto the broken public path. (Secret presence is the
      # discriminator: this same step passes on the internal repo, where the
      # secret is intact, and stops on the public repo, where it is gone.)
      # See RELEASE.md.
      - name: Enforce internal-repo-only release path (JEL-173)
        env:
          HAS_AUTHOR_CERT: ${{ secrets.TIZEN_AUTHOR_P12_BASE64 != '' }}
        run: |
          set -euo pipefail
          if [[ "${HAS_AUTHOR_CERT}" != "true" ]]; then
            echo "::error::No Tizen signing secrets in ${GITHUB_REPOSITORY} — this is the SOURCE-ONLY repo." >&2
            echo "::error::Cut releases from the canonical PRIVATE repo: RumbleCrumbleRS/JellyPlug-Tizen-internal" >&2
            echo "::error::(JEL-162 Decision 2 'bless-internal'). Signing here would emit an UNSIGNED .wgt the TV refuses." >&2
            echo "::error::See RELEASE.md for the full signing policy." >&2
            exit 1
          fi
          echo "Tizen signing secrets present in ${GITHUB_REPOSITORY} — proceeding with the signed release build."

      # Tizen Studio's CLI runs on the JVM; pin a JDK the tooling supports
      # rather than relying on whatever the runner image defaults to.
      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "17"

      # JEL-124: the installer is immutable (SHA-pinned below), so cache the
      # binary and skip the large, flaky download.tizen.org fetch on warm runs.
      # A corrupt cache entry fails the pin check and falls back to a fresh
      # download; either path ends with the same sha256 verification.
      - name: Cache Tizen Studio installer
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/tizen-installer.bin
          key: tizen-installer-${{ env.TIZEN_INSTALLER_SHA256 }}

      - name: Install Tizen Studio Web CLI
        run: |
          set -euo pipefail
          installer="${RUNNER_TEMP}/tizen-installer.bin"
          if [[ -f "$installer" ]] && \
             echo "${TIZEN_INSTALLER_SHA256}  ${installer}" | sha256sum -c -; then
            echo "Using cached Tizen Studio installer (JEL-124)"
          else
            ver="${TIZEN_STUDIO_VER}"
            url="https://download.tizen.org/sdk/Installer/tizen-studio_${ver}/web-cli_Tizen_Studio_${ver}_ubuntu-64.bin"
            echo "Downloading Tizen Studio Web CLI ${ver} from ${url}"
            # download.tizen.org connects flakily from Actions runners; plain
            # --retry does NOT retry connect failures, hence --retry-all-errors.
            curl -fSL --retry 5 --retry-all-errors --retry-delay 15 \
              --connect-timeout 30 -o "$installer" "$url"
            echo "${TIZEN_INSTALLER_SHA256}  ${installer}" | sha256sum -c -
          fi
          chmod +x "$installer"
          # --accept-license is required for unattended install.
          "$installer" --accept-license "${HOME}/tizen-studio"
          # Persist the CLI on PATH for every subsequent step.
          echo "${HOME}/tizen-studio/tools/ide/bin" >> "$GITHUB_PATH"

      - name: Verify tizen CLI is on PATH
        run: tizen version

      # Tizen encrypts security-profile passwords through libsecret/gnome-keyring
      # over D-Bus. A headless runner has neither, so `security-profiles add`
      # silently fails to persist the passwords (it records .pwd paths it never
      # writes) and `tizen package` then signs with an empty password, dying with
      # "CertificationException: Invaild password" — the exact symptom JEL-11
      # misattributed to a wrong TIZEN_AUTHOR_PASSWORD secret. Provide a keyring.
      # (JEL-15; mirrors the ci.yml build-tizen fix from JEL-14, 423558f.)
      - name: Install gnome-keyring for Tizen secure storage
        run: sudo apt-get update && sudo apt-get install -y gnome-keyring dbus-x11 libsecret-1-0

      # `configure-tizen-signing.sh` (security-profiles add) and the signing
      # build (`tizen package` via build_bootstrap.py) MUST share one D-Bus /
      # keyring session for the encrypted profile passwords to round-trip — run
      # both inside a single dbus-run-session with an unlocked (empty-password)
      # login keyring. Previously these were two separate, keyring-less steps,
      # so the author/distributor passwords never persisted and signing failed.
      - name: Configure signing profile + build signed .wgt (keyring session)
        env:
          TIZEN_AUTHOR_P12_BASE64: ${{ secrets.TIZEN_AUTHOR_P12_BASE64 }}
          TIZEN_AUTHOR_PASSWORD: ${{ secrets.TIZEN_AUTHOR_PASSWORD }}
          TIZEN_DISTRIBUTOR_P12_BASE64: ${{ secrets.TIZEN_DISTRIBUTOR_P12_BASE64 }}
          TIZEN_DISTRIBUTOR_PASSWORD: ${{ secrets.TIZEN_DISTRIBUTOR_PASSWORD }}
          TIZEN_PROFILE_NAME: jellyfin
        run: |
          dbus-run-session -- bash -euo pipefail -c '
            echo "" | gnome-keyring-daemon --unlock --components=secrets,pkcs11 >/dev/null 2>&1 || true
            tooling/ci/configure-tizen-signing.sh
            # JEL-143: sign BOTH variants in the same keyring session.
            #   retail -> dist/JellyPlug.wgt   debug -> dist/JellyPlug-Debug.wgt
            python3 packages/shell-tizen-bootstrap/scripts/build_bootstrap.py \
              --sign-profile jellyfin \
              --out dist/
            python3 packages/shell-tizen-bootstrap/scripts/build_bootstrap.py \
              --debug \
              --sign-profile jellyfin \
              --out dist/
          '

      # Tizen's signer writes its real error to cli.log, not stdout, so surface
      # the tail on failure to keep signing breakage diagnosable from the Actions
      # log alone. profiles.xml is NOT dumped here (unlike ci.yml) because this
      # job uses the real release certs — only non-secret signer logs are shown.
      - name: Dump tizen cli.log on failure
        if: failure()
        run: |
          echo "=== security-profiles list ==="
          tizen security-profiles list || true
          echo "=== cli.log tail ==="
          find "$HOME" -name cli.log -exec tail -n 80 {} + 2>/dev/null || true

      - name: Verify both .wgt variants are present + signed (JEL-8/JEL-143 guard)
        # A Tizen TV refuses to install an unsigned package. Fail before
        # publishing if either artifact is missing or lacks author + distributor
        # signatures. JEL-143: the release MUST carry exactly the retail +
        # debug pair, so assert both filenames exist before the signed check.
        run: |
          set -euo pipefail
          for f in JellyPlug.wgt JellyPlug-Debug.wgt; do
            [[ -f "dist/$f" ]] || { echo "::error::dist/$f missing — both variants must build" >&2; exit 1; }
          done
          tooling/ci/verify-wgt-signed.sh dist/JellyPlug.wgt dist/JellyPlug-Debug.wgt

      - name: Upload signed .wgt artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jellyfin-shell-bootstrap-${{ github.sha }}
          path: |
            dist/*.wgt
            packages/shell-tizen-bootstrap/manifest.bootstrap.json

      - name: Resolve release display name
        # The tag stays bootstrap-v<ver> (that's what triggers THIS workflow;
        # jellyplug-v*/tizen-v* belong to release-tizen.yml), but the GitHub
        # Release is titled JellyPlug-v<ver> per user request (JEL-143).
        id: relname
        if: startsWith(github.ref, 'refs/tags/bootstrap-v')
        run: echo "name=JellyPlug-v${GITHUB_REF_NAME#bootstrap-v}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        # Only when launched from a bootstrap-v* tag; workflow_dispatch runs
        # stop at the uploaded artifact above.
        if: startsWith(github.ref, 'refs/tags/bootstrap-v')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: "${{ steps.relname.outputs.name }}"
          files: |
            dist/JellyPlug.wgt
            dist/JellyPlug-Debug.wgt
          body: |
            JellyPlug Hosted Shell Bootstrap.

            - **JellyPlug.wgt** — retail build. Install this on the TV. Diagnostic overlays stay off.
            - **JellyPlug-Debug.wgt** — same shell with both on-screen diagnostic overlays (HSB bootstrap status + shell `__shell_diag`) forced on for every boot. For troubleshooting only.

            Install one WGT via Samsung Device Manager; the shell itself updates server-side after that.
          generate_release_notes: true
          fail_on_unmatched_files: true
