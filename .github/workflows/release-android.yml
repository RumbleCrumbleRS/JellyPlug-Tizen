# Release: build a release-signed Android TV .apk and attach to the
# GitHub Release. Triggered by tags matching android-v*.

name: release-android

on:
  push:
    tags:
      - "android-v*"

jobs:
  release:
    name: build + upload .apk
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p packages/shell-android/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > packages/shell-android/keystore/release.keystore
      - name: Build release .apk
        working-directory: packages/shell-android
        run: |
          # Stubbed until M5 lands the real Gradle project.
          # ./gradlew :app:assembleRelease
          mkdir -p app/build/outputs/apk/release
          echo "android release placeholder - M5" > app/build/outputs/apk/release/jellyfin-tv-shell-release.apk.placeholder
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/shell-android/app/build/outputs/apk/release/*
          generate_release_notes: true
