# Release: build a webOS .ipk and attach to the GitHub Release.
# Triggered by tags matching webos-v*.

name: release-webos

on:
  push:
    tags:
      - "webos-v*"

jobs:
  release:
    name: build + upload .ipk
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install ares-cli
        run: npm i -g @webosose/ares-cli
      - name: Build .ipk
        run: pnpm --filter @jellyfin-tv/shell-webos build
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/shell-webos/dist/*.ipk
          generate_release_notes: true
