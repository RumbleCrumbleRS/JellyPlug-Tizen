# Release: publish a pre-built signed Tizen .wgt as a GitHub Release.
# Triggered by tags matching jellyplug-v* (live scheme) or tizen-v* (legacy).
#
# The workflow looks for `release-artifacts/v<version>/*.wgt` in the tagged
# commit (where <version> is everything after the `-v` prefix) and attaches it
# to the Release. The widget is built and signed locally by the maintainer (see
# `packages/shell-tizen/scripts/build-wgt.sh` and `release-artifacts/README.md`)
# until the CI image + Tizen signing secrets are wired up.
#
# Two guards run before anything is published:
#   - verify-wgt-signed.sh        (JEL-8)   the artifact IS signed
#   - verify-wgt-source-match.sh  (JEL-121) the artifact's payload is
#     byte-identical to the tagged source (signatures excluded), so a
#     tampered or stale committed .wgt can never ship.

name: release-tizen

on:
  push:
    tags:
      - "jellyplug-v*"
      - "tizen-v*"

jobs:
  release:
    name: attach signed .wgt to Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve version + artifact path
        id: resolve
        run: |
          tag="${GITHUB_REF##*/}"            # jellyplug-v1.0.0 / tizen-v1.0.0
          version="${tag#jellyplug-v}"       # strip whichever prefix matched
          version="${version#tizen-v}"       # 1.0.0
          dir="release-artifacts/v${version}"
          shopt -s nullglob
          wgts=("$dir"/*.wgt)
          shopt -u nullglob
          if [[ ${#wgts[@]} -eq 0 ]]; then
            echo "::error::No .wgt found in $dir for tag $tag. Build locally and commit it before tagging." >&2
            exit 1
          fi
          {
            echo "version=$version"
            echo "wgt_path=${wgts[0]}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify .wgt is signed (JEL-8 guard)
        # A Tizen TV refuses to install an unsigned package. Fail the release
        # before it is published if the artifact lacks author + distributor
        # signatures, so we never ship an uninstallable .wgt again.
        run: tooling/ci/verify-wgt-signed.sh "${{ steps.resolve.outputs.wgt_path }}"

      - name: Verify .wgt payload matches tagged source (JEL-121 guard)
        # A signature proves who built the artifact, not what was built. Stage
        # the retail widget payload from this tag's checkout and byte-compare
        # it against the committed .wgt (signatures excluded) so a compromised
        # build machine or stale/tampered commit can never publish.
        run: tooling/ci/verify-wgt-source-match.sh "${{ steps.resolve.outputs.wgt_path }}"

      - name: Create Release + attach .wgt
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: "Tizen Shell v${{ steps.resolve.outputs.version }}"
          files: ${{ steps.resolve.outputs.wgt_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
